name: CI/CD Pipeline & Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 4 * * 1'  # Weekly Monday 4:30 AM UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: PHP Lint Check
  # ─────────────────────────────────────────────
  php-lint:
    name: 🔍 PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring
          coverage: none

      - name: Lint PHP Files
        run: |
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -path "./vendor/*" \
            | xargs -I {} php -l {} | grep -v "No syntax errors" || true
          echo "✅ PHP lint check complete"

  # ─────────────────────────────────────────────
  # Job 2: CodeQL Static Security Analysis
  # ─────────────────────────────────────────────
  codeql-analysis:
    name: 🛡️ CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: php-lint
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'php' ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
